name: Release

# Triggers on tag push (e.g. `git tag 0.1.0 && git push origin 0.1.0`).
# Mirrors the internal GitLab release pipeline, with two key differences:
#   - macOS binaries built natively on GitHub macOS runners (no manual step)
#   - veda-fuse skipped on macOS (macFUSE kext can't be installed on CI runners)

on:
  push:
    tags:
      - '*'

permissions:
  contents: write    # needed by `gh release create`

env:
  ZIG_VERSION: "0.13.0"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            cross: false
            with-fuse: true
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-latest
            cross: true
            with-fuse: false   # cross-compile of fuser/libfuse3 unsupported
          # macos-14 (M1) hosts both: aarch64 native, x86_64 via cross-compile.
          # macos-13 (Intel) free-runner queue is essentially dead on GitHub now.
          - target: x86_64-apple-darwin
            runs-on: macos-14
            cross: true
            with-fuse: false
          - target: aarch64-apple-darwin
            runs-on: macos-14
            cross: false
            with-fuse: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install linux FUSE deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev pkg-config

      # zigbuild needed only for cross-compile from linux. Darwin -> darwin
      # cross-compile uses Xcode toolchain (universal SDK on macos-14).
      - name: Install zig (linux cross only)
        if: matrix.cross && runner.os == 'Linux'
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install cargo-zigbuild (linux cross only)
        if: matrix.cross && runner.os == 'Linux'
        run: cargo install --locked cargo-zigbuild

      - name: Build veda
        run: |
          if [ "${{ matrix.cross }}" = "true" ] && [ "${{ runner.os }}" = "Linux" ]; then
            cargo zigbuild --release --target "${{ matrix.target }}" --bin veda
          else
            cargo build --release --target "${{ matrix.target }}" --bin veda
          fi
          mv "target/${{ matrix.target }}/release/veda" "veda-${{ matrix.target }}"

      - name: Build veda-fuse
        if: matrix.with-fuse
        run: |
          if [ "${{ matrix.cross }}" = "true" ] && [ "${{ runner.os }}" = "Linux" ]; then
            cargo zigbuild --release --target "${{ matrix.target }}" -p veda-fuse --bin veda-fuse
          else
            cargo build --release --target "${{ matrix.target }}" -p veda-fuse --bin veda-fuse
          fi
          mv "target/${{ matrix.target }}/release/veda-fuse" "veda-fuse-${{ matrix.target }}"

      - name: Compute sha256
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            HASH="sha256sum"
          else
            HASH="shasum -a 256"
          fi
          $HASH "veda-${{ matrix.target }}" > "veda-${{ matrix.target }}.sha256"
          if [ "${{ matrix.with-fuse }}" = "true" ]; then
            $HASH "veda-fuse-${{ matrix.target }}" > "veda-fuse-${{ matrix.target }}.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            veda-${{ matrix.target }}
            veda-${{ matrix.target }}.sha256
            veda-fuse-${{ matrix.target }}
            veda-fuse-${{ matrix.target }}.sha256
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # use dist/* (not dist/veda-* dist/veda-fuse-*): the second pattern
          # is already covered by the first, so listing both uploads each
          # veda-fuse-* file twice → HTTP 422 "asset name already exists"
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Veda ${{ github.ref_name }}" \
            --generate-notes \
            dist/* skill.md skill-fuse.md

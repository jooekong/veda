# Observability-only compose file for alpha. Brings up Prometheus (and
# optionally Grafana) to scrape a locally-running veda-server. The full
# end-to-end compose (mysql + milvus + server + worker + reconciler) lives
# in Week 5; this file is enough for "I want to see metrics while I dev".
#
# Setup (one-time):
#   1. Set the same token in the server config / env (VEDA_METRICS_TOKEN).
#   2. Write that token (no trailing newline) into:
#         deploy/secrets/veda_metrics_token
#      The file must exist before `docker compose up`, otherwise the
#      bind mount creates a directory and Prometheus 404s on every scrape.
#      `./secrets/` is gitignored.
#
# Usage:
#   cd deploy
#   docker compose -f docker-compose.observability.yml up -d
#   open http://localhost:9090   # Prometheus
#   open http://localhost:3001   # Grafana (admin / admin on first login)
#
# Make sure veda-server is running on the host at port 3000 before
# Prometheus starts polling, otherwise the first few scrapes show DOWN —
# that's expected and self-heals.

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./secrets/veda_metrics_token:/etc/prometheus/secrets/veda_metrics_token:ro
      - prometheus-data:/prometheus
    extra_hosts:
      # Required on Linux so `host.docker.internal` in prometheus.yml
      # resolves to the host. macOS/Windows already do this.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:

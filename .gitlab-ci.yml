# Release pipeline for Veda on internal GitLab.
# Triggers on tag push (e.g. `git tag 0.1.0 && git push ddxq 0.1.0`).
#
# Matrix:
#   - x86_64-unknown-linux-gnu — docker rust:1.90 on the linux runner
#   - x86_64-apple-darwin      — shell executor on the intel mac runner
#
# Darwin aarch64 is not built yet — adding it requires a working
# cross-compile of veda-fuse against macFUSE for arm64, which we
# haven't validated. CLI-only aarch64-darwin is straightforward to
# add later (just drop the veda-fuse build for that target).

stages:
  - build
  - publish
  - release

variables:
  REGISTRY: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/veda/${CI_COMMIT_TAG}"

build:linux:
  stage: build
  image: rust:1.90-bookworm
  rules:
    - if: $CI_COMMIT_TAG
  tags:
    - release
    - veda
  variables:
    TARGET: x86_64-unknown-linux-gnu
    # CARGO_HOME under CI_PROJECT_DIR so the future cache: block can
    # reach the registry — the default $HOME/.cargo lives outside the
    # cached path. (Cache backend not yet configured on the runner,
    # see config.toml `[runners.cache]`.)
    CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
    CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  before_script:
    # Swap to in-region apt + cargo mirrors before any network fetch.
    # aliyun debian: ~26 MB/s vs ~22 KB/s upstream.
    - sed -i 's|http://deb.debian.org|https://mirrors.aliyun.com|g' /etc/apt/sources.list.d/debian.sources
    - mkdir -p "${CARGO_HOME}"
    # rsproxy sparse vs USTC git: cargo's git protocol clones the entire
    # crates.io-index repo (~640k objects) on every cache-miss build —
    # measured 1458s wall time including ~175 "spurious network error"
    # retries on this runner. rsproxy's sparse protocol fetches one
    # JSON per crate on demand; metadata probe was 0.13-1.17s per
    # crate (10/10 success). If rsproxy.cn ever returns errors, the
    # fallback is to revert this block, not to flip to USTC git.
    - |
      cat > "${CARGO_HOME}/config.toml" <<'EOF'
      [source.crates-io]
      replace-with = "rsproxy-sparse"

      [source.rsproxy-sparse]
      registry = "sparse+https://rsproxy.cn/index/"
      EOF
    - apt-get update
    - apt-get install -y --no-install-recommends libfuse3-dev pkg-config
  script:
    - cargo build --release --bin veda
    - cargo build --release -p veda-fuse --bin veda-fuse
    - mv "target/release/veda"      "veda-${TARGET}"
    - mv "target/release/veda-fuse" "veda-fuse-${TARGET}"
    - sha256sum "veda-${TARGET}"      > "veda-${TARGET}.sha256"
    - sha256sum "veda-fuse-${TARGET}" > "veda-fuse-${TARGET}.sha256"
    # rust:1.90-bookworm sets umask 027 — without this chmod, the
    # binaries land 0750 and the sha256 files 0640, root-owned. The
    # publish stage's curlimages/curl runs as USER curl_user (UID 100)
    # and can't open them. `a+rX` adds world-read to files and
    # exec-where-already-exec to dirs/binaries.
    - chmod a+rX "veda-${TARGET}" "veda-${TARGET}.sha256" "veda-fuse-${TARGET}" "veda-fuse-${TARGET}.sha256"
  artifacts:
    paths:
      - veda-x86_64-unknown-linux-gnu
      - veda-x86_64-unknown-linux-gnu.sha256
      - veda-fuse-x86_64-unknown-linux-gnu
      - veda-fuse-x86_64-unknown-linux-gnu.sha256
      - skill.md
      - skill-fuse.md
    expire_in: 1 week

build:darwin-x86_64:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG
  tags:
    - macos
    - veda
  variables:
    TARGET: x86_64-apple-darwin
  before_script:
    # Belt-and-suspenders: ensure the target is installed even if the
    # runner host got reinstalled or rustup was wiped. No-op if already there.
    - rustup target add ${TARGET}
    # Visibility for the trace — which toolchain are we building with.
    - rustc --version
    - cargo --version
  script:
    - cargo build --release --target ${TARGET} --bin veda
    - cargo build --release --target ${TARGET} -p veda-fuse --bin veda-fuse
    - mv "target/${TARGET}/release/veda"      "veda-${TARGET}"
    - mv "target/${TARGET}/release/veda-fuse" "veda-fuse-${TARGET}"
    # macOS doesn't ship coreutils' sha256sum by default; use shasum -a 256
    # which is part of every base install.
    - shasum -a 256 "veda-${TARGET}"      > "veda-${TARGET}.sha256"
    - shasum -a 256 "veda-fuse-${TARGET}" > "veda-fuse-${TARGET}.sha256"
    - chmod a+rX "veda-${TARGET}" "veda-${TARGET}.sha256" "veda-fuse-${TARGET}" "veda-fuse-${TARGET}.sha256"
  artifacts:
    paths:
      - veda-x86_64-apple-darwin
      - veda-x86_64-apple-darwin.sha256
      - veda-fuse-x86_64-apple-darwin
      - veda-fuse-x86_64-apple-darwin.sha256
    expire_in: 1 week

build:darwin-aarch64:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG
  tags:
    - macos
    - veda
  variables:
    TARGET: aarch64-apple-darwin
  before_script:
    - rustup target add ${TARGET}
    - rustc --version
    - cargo --version
  # CLI-only on aarch64 from an Intel host. The fuser-0.14 crate's
  # build.rs uses pkg-config to discover macFUSE, and pkg-config
  # refuses cross-architecture lookups by default — job 1291940 hit
  # exactly this:
  #   "pkg-config has not been configured to support cross-compilation"
  # GitHub Actions hits the same wall and disables veda-fuse for all
  # darwin targets. Same policy here. Users who need veda-fuse on
  # M1/M2/M3 can `cargo install --path crates/veda-fuse` locally
  # (macFUSE installed on their machine).
  script:
    - cargo build --release --target ${TARGET} --bin veda
    - mv "target/${TARGET}/release/veda" "veda-${TARGET}"
    - shasum -a 256 "veda-${TARGET}" > "veda-${TARGET}.sha256"
    - chmod a+rX "veda-${TARGET}" "veda-${TARGET}.sha256"
  artifacts:
    paths:
      - veda-aarch64-apple-darwin
      - veda-aarch64-apple-darwin.sha256
    expire_in: 1 week

publish:all:
  stage: publish
  image: curlimages/curl:8.5.0
  rules:
    - if: $CI_COMMIT_TAG
  tags:
    - release
    - veda
  # Long-form `needs:` with explicit `artifacts: true` — under GitLab 18
  # the short form silently shipped without artifacts (job 1291760).
  needs:
    - job: build:linux
      artifacts: true
    - job: build:darwin-x86_64
      artifacts: true
    - job: build:darwin-aarch64
      artifacts: true
  script:
    - ls -la
    # Glob walks whatever artifacts landed; adding a new build target
    # later needs no edits here. `veda-*` already matches `veda-fuse-*`
    # (the latter is a prefix subset), so listing `veda-fuse-*`
    # separately would upload the fuse binaries twice — fine today
    # because the project allows duplicate Generic Package uploads,
    # but a `curl --fail` away from breaking if that setting flips.
    # Codex review caught this on the 24h batch.
    - |
      for f in veda-* skill.md skill-fuse.md; do
        echo "uploading $f..."
        curl --fail --show-error --silent \
             --header "JOB-TOKEN: $CI_JOB_TOKEN" \
             --upload-file "$f" \
             "${REGISTRY}/$f"
      done
    # Update the "latest" pointer at packages/generic/veda/latest/LATEST_VERSION
    # so install.sh can resolve the newest version without hardcoding it.
    # Skip prerelease tags: `*-test` (internal CI builds against the GitLab
    # runner matrix, e.g. 0.0.12-test) and `*-rc*/-alpha*/-beta*` must
    # never shadow a real release like 0.1.6. The pointer is a tiny text
    # file containing only the tag — install.sh fetches and trims.
    - |
      case "$CI_COMMIT_TAG" in
        *-test|*-rc*|*-alpha*|*-beta*)
          echo "skipping LATEST_VERSION update for prerelease tag: $CI_COMMIT_TAG"
          ;;
        *)
          echo "updating LATEST_VERSION pointer to $CI_COMMIT_TAG..."
          printf '%s' "$CI_COMMIT_TAG" > LATEST_VERSION
          curl --fail --show-error --silent \
               --header "JOB-TOKEN: $CI_JOB_TOKEN" \
               --upload-file LATEST_VERSION \
               "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/veda/latest/LATEST_VERSION"
          ;;
      esac

release:create:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  tags:
    - release
    - veda
  needs: ["publish:all"]
  script:
    - |
      release-cli create --name "Veda ${CI_COMMIT_TAG}" --tag-name "${CI_COMMIT_TAG}" \
        --assets-link "{\"name\":\"veda-x86_64-linux\",\"url\":\"${REGISTRY}/veda-x86_64-unknown-linux-gnu\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"veda-fuse-x86_64-linux\",\"url\":\"${REGISTRY}/veda-fuse-x86_64-unknown-linux-gnu\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"veda-x86_64-darwin\",\"url\":\"${REGISTRY}/veda-x86_64-apple-darwin\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"veda-fuse-x86_64-darwin\",\"url\":\"${REGISTRY}/veda-fuse-x86_64-apple-darwin\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"veda-aarch64-darwin\",\"url\":\"${REGISTRY}/veda-aarch64-apple-darwin\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"skill.md\",\"url\":\"${REGISTRY}/skill.md\",\"link_type\":\"other\"}" \
        --assets-link "{\"name\":\"skill-fuse.md\",\"url\":\"${REGISTRY}/skill-fuse.md\",\"link_type\":\"other\"}"

# Release pipeline for Veda CLI.
# Triggers on tag push (e.g. `git tag 0.1.0 && git push origin 0.1.0`).
# Cross-compiles linux x86_64 + aarch64 via cargo-zigbuild, uploads binaries
# to the GitLab Generic Package Registry, then creates a Release entry.
# Darwin binaries are added separately by scripts/release-darwin.sh.

stages:
  - build
  - publish
  - release

variables:
  REGISTRY: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/veda/${CI_COMMIT_TAG}"
  ZIG_VERSION: "0.13.0"

build:linux:
  stage: build
  image: rust:1.83-bookworm
  rules:
    - if: $CI_COMMIT_TAG
  # If your runner has tags, uncomment and match them:
  # tags:
  #   - docker
  parallel:
    matrix:
      - TARGET: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends curl xz-utils libfuse3-dev pkg-config
    - curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" | tar xJ -C /opt
    - export PATH="/opt/zig-linux-x86_64-${ZIG_VERSION}:$PATH"
    - cargo install --locked cargo-zigbuild
    - rustup target add "${TARGET}"
  script:
    - cargo zigbuild --release --target "${TARGET}" --bin veda
    - cargo zigbuild --release --target "${TARGET}" -p veda-fuse --bin veda-fuse
    - mv "target/${TARGET}/release/veda"      "veda-${TARGET}"
    - mv "target/${TARGET}/release/veda-fuse" "veda-fuse-${TARGET}"
    - sha256sum "veda-${TARGET}"      > "veda-${TARGET}.sha256"
    - sha256sum "veda-fuse-${TARGET}" > "veda-fuse-${TARGET}.sha256"
  artifacts:
    paths:
      - veda-*
      - veda-fuse-*
    expire_in: 1 week

publish:linux:
  stage: publish
  image: curlimages/curl:8.5.0
  rules:
    - if: $CI_COMMIT_TAG
  needs: ["build:linux"]
  script:
    - |
      for f in veda-* veda-fuse-* skill.md; do
        echo "uploading $f..."
        curl --fail --show-error --silent \
             --header "JOB-TOKEN: $CI_JOB_TOKEN" \
             --upload-file "$f" \
             "${REGISTRY}/$f"
      done

release:create:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs: ["publish:linux"]
  script:
    - |
      release-cli create --name "Veda ${CI_COMMIT_TAG}" --tag-name "${CI_COMMIT_TAG}" \
        --assets-link "{\"name\":\"veda-x86_64-linux\",\"url\":\"${REGISTRY}/veda-x86_64-unknown-linux-gnu\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"veda-aarch64-linux\",\"url\":\"${REGISTRY}/veda-aarch64-unknown-linux-gnu\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"veda-fuse-x86_64-linux\",\"url\":\"${REGISTRY}/veda-fuse-x86_64-unknown-linux-gnu\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"veda-fuse-aarch64-linux\",\"url\":\"${REGISTRY}/veda-fuse-aarch64-unknown-linux-gnu\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"skill.md\",\"url\":\"${REGISTRY}/skill.md\",\"link_type\":\"other\"}"

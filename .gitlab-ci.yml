# Release pipeline for Veda CLI on internal GitLab.
# Triggers on tag push (e.g. `git tag 0.1.0 && git push ddxq 0.1.0`).
# Native x86_64-linux build only. Aarch64-linux users go through GitHub Actions
# (which has internet access and ARM runners). Darwin binaries are added later
# by scripts/release-darwin.sh from Joe's mac.

stages:
  - build
  - publish
  - release

variables:
  REGISTRY: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/veda/${CI_COMMIT_TAG}"
  TARGET: "x86_64-unknown-linux-gnu"
  # Egress to deb.debian.org / crates.io from this runner is throttled
  # to ~22 KB/s; in-region mirrors clock 25-30 MB/s. CARGO_HOME is
  # pinned under CI_PROJECT_DIR so the generated config.toml lives
  # alongside the project (and so we can wire `cache:` in later
  # without moving anything — the runner's cache backend currently
  # isn't configured, see config.toml `[runners.cache]`).
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

build:linux:
  stage: build
  image: rust:1.85-bookworm
  rules:
    - if: $CI_COMMIT_TAG
  tags:
    - release
    - veda
  before_script:
    # Swap to in-region apt + cargo mirrors before any network fetch.
    # aliyun debian: ~26 MB/s vs ~22 KB/s upstream.
    - sed -i 's|http://deb.debian.org|https://mirrors.aliyun.com|g' /etc/apt/sources.list.d/debian.sources
    - mkdir -p "${CARGO_HOME}"
    - |
      cat > "${CARGO_HOME}/config.toml" <<'EOF'
      [source.crates-io]
      replace-with = "ustc"

      [source.ustc]
      registry = "https://mirrors.ustc.edu.cn/crates.io-index"
      EOF
    - apt-get update
    - apt-get install -y --no-install-recommends libfuse3-dev pkg-config
  script:
    - cargo build --release --bin veda
    - cargo build --release -p veda-fuse --bin veda-fuse
    - mv "target/release/veda"      "veda-${TARGET}"
    - mv "target/release/veda-fuse" "veda-fuse-${TARGET}"
    - sha256sum "veda-${TARGET}"      > "veda-${TARGET}.sha256"
    - sha256sum "veda-fuse-${TARGET}" > "veda-fuse-${TARGET}.sha256"
  artifacts:
    paths:
      - veda-*
      - veda-fuse-*
    expire_in: 1 week

publish:linux:
  stage: publish
  image: curlimages/curl:8.5.0
  rules:
    - if: $CI_COMMIT_TAG
  tags:
    - release
    - veda
  needs: ["build:linux"]
  script:
    - |
      for f in veda-${TARGET} veda-${TARGET}.sha256 \
               veda-fuse-${TARGET} veda-fuse-${TARGET}.sha256 \
               skill.md; do
        echo "uploading $f..."
        curl --fail --show-error --silent \
             --header "JOB-TOKEN: $CI_JOB_TOKEN" \
             --upload-file "$f" \
             "${REGISTRY}/$f"
      done

release:create:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  tags:
    - release
    - veda
  needs: ["publish:linux"]
  script:
    - |
      release-cli create --name "Veda ${CI_COMMIT_TAG}" --tag-name "${CI_COMMIT_TAG}" \
        --assets-link "{\"name\":\"veda-x86_64-linux\",\"url\":\"${REGISTRY}/veda-${TARGET}\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"veda-fuse-x86_64-linux\",\"url\":\"${REGISTRY}/veda-fuse-${TARGET}\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"skill.md\",\"url\":\"${REGISTRY}/skill.md\",\"link_type\":\"other\"}"
